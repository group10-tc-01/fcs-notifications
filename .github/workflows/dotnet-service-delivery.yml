name: Fcs.Notifications Delivery To K3s
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/k3s-service-delivery.yml@main
    with:
      service_name: fcs-notifications
      image_repository: ghcr.io/group10-tc-01/fcs-notifications
      source_ref: ${{ github.sha }}
      k8s_namespace: fcs-notifications
      k8s_deployment_name: fcs-notifications
      k8s_container_name: worker
      k8s_manifest_path: k8s
      k8s_apply_mode: kustomize
      healthcheck_url: https://fcs-notifications.flaviojcf.com.br/health
      vps_host: ${{ vars.VPS_HOST }}
      vps_deploy_user: ${{ vars.VPS_DEPLOY_USER }}
      environment: production
    secrets: inherit
