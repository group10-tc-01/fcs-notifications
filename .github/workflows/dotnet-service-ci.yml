name: fcs.Notifications CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write
  packages: write
jobs:
  ci:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/dotnet-service-ci.yml@main
    with:
      service_name: fcs-notifications
      dotnet_version: 10.0.x
      solution_path: Fcs.Notifications.slnx
      unit_tests_path: tests/Fcs.Notifications.UnitTests/Fcs.Notifications.UnitTests.csproj
      test_environment: Test
      coverage_threshold: 80
      run_sonar: false
      dockerfile_path: src/Fcs.Notifications.Worker/Dockerfile
      docker_context: .
    secrets: inherit
