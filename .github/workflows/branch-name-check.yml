name: Branch Policy
on:
  pull_request:
    branches: [main, develop]
permissions:
  contents: read
  pull-requests: write
jobs:
  branch-name:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/branch-name-check.yml@main
    with:
      allowed_pattern: ^(feature|fix|bugfix|hotfix|release|chore|docs|refactor|test)\/[a-z0-9._-]+$
      allow_main: false
