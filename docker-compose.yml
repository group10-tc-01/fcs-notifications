services:
  seq:
    image: datalust/seq:latest
    container_name: seq-fcs-notifications
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:5341"
      - "5342:80"
    networks:
      - fcs-notifications-network

  fcs-notifications:
    build:
      context: .
      dockerfile: src/Fcs.Notifications.Worker/Dockerfile
    container_name: fcs-notifications
    depends_on:
      seq:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - Resend__ApiKey=${RESEND_API_KEY:-}
      - ResendTemplates__DonorWelcomeTemplateId=${RESEND_DONOR_WELCOME_TEMPLATE_ID:-}
      - ResendTemplates__DonationCreatedTemplateId=${RESEND_DONATION_CREATED_TEMPLATE_ID:-}
      - ResendTemplates__DonationProcessedTemplateId=${RESEND_DONATION_PROCESSED_TEMPLATE_ID:-}
      - Observability__EnableOtlpExporter=true
      - Observability__OtlpEndpoint=http://otel-collector:4318
      - Observability__OtlpAuthHeader=
    ports:
      - "5007:8080"
    networks:
      - fcs-notifications-network
      - observability
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-fcs-notifications
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fcs-notifications-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-fcs-notifications
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fcs-notifications-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-fcs-notifications
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    networks:
      - fcs-notifications-network

networks:
  fcs-notifications-network:
    driver: bridge
  observability:
    name: fcs-observability
    external: true
