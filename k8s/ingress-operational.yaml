apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fcs-notifications-operational
  namespace: fcs-notifications
spec:
  ingressClassName: fcs-traefik
  tls:
    - hosts: [fcs-notifications.flaviojcf.com.br]
      secretName: fcs-notifications-tls
  rules:
    - host: fcs-notifications.flaviojcf.com.br
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: fcs-notifications-service
                port: { number: 8080 }
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: fcs-notifications-service
                port: { number: 8080 }
